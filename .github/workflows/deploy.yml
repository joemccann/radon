name: Deploy to VPS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: radon
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/radon-cloud
            bash scripts/deploy.sh
